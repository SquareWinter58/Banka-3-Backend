syntax = "proto3";

package bank;

option go_package = "github.com/RAF-SI-2025/Banka-3-Backend/gen/bank";

service BankService {
  rpc GetPaymentRecipients(GetPaymentRecipientsRequest) returns (GetPaymentRecipientsResponse);
  rpc CreatePaymentRecipient(CreatePaymentRecipientRequest) returns (CreatePaymentRecipientResponse);
  rpc UpdatePaymentRecipient(UpdatePaymentRecipientRequest) returns (UpdatePaymentRecipientResponse);
  rpc DeletePaymentRecipient(DeletePaymentRecipientRequest) returns (DeletePaymentRecipientResponse);

  rpc GetTransactions(GetTransactionsRequest) returns (GetTransactionsResponse);
  rpc GetTransactionById(GetTransactionByIdRequest) returns (GetTransactionByIdResponse);
  rpc GenerateTransactionPdf(GenerateTransactionPdfRequest) returns (GenerateTransactionPdfResponse);
}

message PaymentRecipient {
  int64 id = 1;
  string name = 2;
  string account_number = 3;
}

message GetPaymentRecipientsRequest {
  int64 client_id = 1;
}

message GetPaymentRecipientsResponse {
  repeated PaymentRecipient recipients = 1;
}

message CreatePaymentRecipientRequest {
  int64 client_id = 1;
  string name = 2;
  string account_number = 3;
}

message CreatePaymentRecipientResponse {
  PaymentRecipient recipient = 1;
}

message UpdatePaymentRecipientRequest {
  int64 id = 1;
  int64 client_id = 2;
  string name = 3;
  string account_number = 4;
}

message UpdatePaymentRecipientResponse {
  PaymentRecipient recipient = 1;
}

message DeletePaymentRecipientRequest {
  int64 id = 1;
  int64 client_id = 2;
}

message DeletePaymentRecipientResponse {
  bool success = 1;
}

message Transaction {
  int64 id = 1;
  string type = 2;
  string from_account = 3;
  string to_account = 4;
  double start_amount = 5;
  double end_amount = 6;
  double commission = 7;
  string status = 8;
  int64 timestamp = 9;

  int64 recipient_id = 10;
  string transaction_code = 11;
  string call_number = 12;
  string reason = 13;

  int64 start_currency_id = 14;
  double exchange_rate = 15;
}

message GetTransactionsRequest {
  int64 client_id = 1;

  string date_from = 2;
  string date_to = 3;

  double amount_from = 4;
  double amount_to = 5;

  string status = 6;

  int32 page = 7;
  int32 page_size = 8;

  string sort_by = 9;
  string sort_order = 10;
}

message GetTransactionsResponse {
  repeated Transaction transactions = 1;
  int32 page = 2;
  int32 page_size = 3;
  int64 total = 4;
  int32 total_pages = 5;
}

message GetTransactionByIdRequest {
  int64 client_id = 1;
  int64 id = 2;
  string type = 3;
}

message GetTransactionByIdResponse {
  Transaction transaction = 1;
}

message GenerateTransactionPdfRequest {
  int64 client_id = 1;
  int64 id = 2;
  string type = 3;
}

message GenerateTransactionPdfResponse {
  bytes pdf = 1;
  string file_name = 2;
}
